<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Godzilla dorsal spine silhouette as sidebar icon -->
  <rect x="0" y="0" width="24" height="24" rx="4" fill="#0d0d0f"/>
  <!-- Body -->
  <ellipse cx="12" cy="16" rx="6" ry="7" fill="#1a3a2a" stroke="#00ff88" stroke-width="1"/>
  <!-- Dorsal spines -->
  <polygon points="8,12 9,6 10,12" fill="#00ff88"/>
  <polygon points="11,10 12,3 13,10" fill="#00ff88"/>
  <polygon points="14,12 15,6 16,12" fill="#00ff88"/>
  <!-- Eyes -->
  <circle cx="10" cy="13" r="1.2" fill="#ff2200"/>
  <circle cx="14" cy="13" r="1.2" fill="#ff2200"/>
  <!-- Tail -->
  <path d="M17 18 Q20 17 21 15" stroke="#1a3a2a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M17 18 Q20 17 21 15" stroke="#00ff88" stroke-width="1" stroke-linecap="round" fill="none"/>
</svg>
